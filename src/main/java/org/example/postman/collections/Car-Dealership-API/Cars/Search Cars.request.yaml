    value: application/json
body:
  type: json
  content: |-
    {
      "brand": "Toyota",
      "model": "Camry",
      "minPrice": 1000000,
      "maxPrice": 5000000,
      "minYear": 2020,
      "maxYear": 2024,
      "availableOnly": true
    }
